<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Admin Dashboard | Leisure Fan Tours and Safaris
    </title>

    <link
        rel="stylesheet"
        href="Admin.css"
    >

</head>


<body>

    <!-- =====================================
         ADMIN HEADER
    ====================================== -->

    <header class="admin-header">

        <div>

            <h1>
                Leisure Fan Tours and Safaris
            </h1>

            <p>
                Administration Dashboard
            </p>

        </div>


        <button
            id="logoutButton"
            class="logout-button">

            Logout

        </button>

    </header>


    <!-- =====================================
         MAIN CONTENT
    ====================================== -->

    <main class="admin-container">


        <!-- ADMIN WELCOME -->

        <section class="welcome-section">

            <h2>
                Welcome, Administrator
            </h2>

            <p>
                Manage customer reviews and website content.
            </p>

        </section>


        <!-- =================================
             REVIEW STATISTICS
        ================================== -->

        <section class="stats-container">

            <div class="stat-card">

                <h3>
                    Total Reviews
                </h3>

                <p id="totalReviews">
                    0
                </p>

            </div>


            <div class="stat-card">

                <h3>
                    Approved
                </h3>

                <p id="approvedReviews">
                    0
                </p>

            </div>


            <div class="stat-card">

                <h3>
                    Pending
                </h3>

                <p id="pendingReviews">
                    0
                </p>

            </div>

        </section>


        <!-- =================================
             REVIEWS MANAGEMENT
        ================================== -->

        <section class="reviews-section">

            <div class="section-header">

                <h2>
                    Customer Reviews
                </h2>

                <button
                    id="refreshReviews"
                    class="refresh-button">

                    Refresh

                </button>

            </div>


            <div
                id="adminMessage"
                class="admin-message">
            </div>


            <div
                id="adminReviewsContainer"
                class="admin-reviews-container">

                <div class="loading">

                    Loading reviews...

                </div>

            </div>

        </section>

    </main>


    <!-- =====================================
         JAVASCRIPT
    ====================================== -->

    <script
        type="module"
        src="Admin.js">
    </script>

</body>

</html>
