<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leisure Fan Tours & Safaris | Review Management</title>

<link rel="stylesheet" href="admin.css">

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
    getAuth,
    onAuthStateChanged,
    signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBbar43VLO99kgMLiC90drSXiVADS-xyaw",
    authDomain: "leisure-fan-tours-and-safaris.firebaseapp.com",
    projectId: "leisure-fan-tours-and-safaris",
    storageBucket: "leisure-fan-tours-and-safaris.firebasestorage.app",
    messagingSenderId: "199881242074",
    appId: "1:199881242074:web:887ced6c38c7de0712bce3"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Protect this page
onAuthStateChanged(auth, (user) => {

    if (!user) {

        window.location.href = "login.html";

    }

});

// Logout
window.logout = function () {

    signOut(auth)
        .then(() => {

            window.location.href = "login.html";

        })
        .catch((error) => {

            alert(error.message);

        });

}

</script>

</head>

<body>

<h1>Review Management Dashboard</h1>

<p>Approve customer reviews before they appear on the website.</p>

<button onclick="logout()">
Logout
</button>

<div id="reviewsList"></div>

<script type="module" src="admin.js"></script>


<div id="reviewsList"></div>

<script type="module" src="admin.js"></script>
</body>

</html>
