<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Admin Login | Leisure Fan Tours and Safaris</title>

    <link rel="stylesheet" href="Admin.css">
</head>

<body class="login-page">

    <div class="login-container">

        <div class="login-card">

            <div class="login-logo">
                <div class="logo-circle">
                    LF
                </div>
            </div>

            <h1>Leisure Fan Tours</h1>

            <p class="login-subtitle">
                Admin Dashboard
            </p>

            <h2>Administrator Login</h2>

            <form id="loginForm">

                <div class="form-group">

                    <label for="email">
                        Email Address
                    </label>

                    <input
                        type="email"
                        id="email"
                        placeholder="Enter admin email"
                        required
                    >

                </div>


                <div class="form-group">

                    <label for="password">
                        Password
                    </label>

                    <input
                        type="password"
                        id="password"
                        placeholder="Enter password"
                        required
                    >

                </div>


                <button
                    type="submit"
                    id="loginButton"
                    class="login-button">

                    Login

                </button>

            </form>


            <div
                id="loginMessage"
                class="login-message">
            </div>


            <a
                href="index.html"
                class="back-home">

                ← Back to Website

            </a>

        </div>

    </div>


    <script
        type="module"
        src="Login.js">
    </script>

</body>

</html>
