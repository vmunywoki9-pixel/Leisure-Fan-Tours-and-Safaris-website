<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Leisure Fan Tours and Safaris | Admin</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f5f5f5;
            padding: 30px;
            min-height: 100vh;
        }

        /* LOGIN */

        #loginSection {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
        }

        .login-box {
            background: white;
            padding: 40px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,.2);
            text-align: center;
        }

        .login-box img {
            width: 90px;
            margin-bottom: 15px;
        }

        .login-box h2 {
            color: #00695c;
            margin-bottom: 10px;
        }

        .login-box p {
            margin-bottom: 20px;
            color: #666;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            background: #00695c;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 17px;
            cursor: pointer;
        }

        .login-box button:hover {
            background: #004d40;
        }

        .back {
            display: block;
            margin-top: 20px;
            text-decoration: none;
            color: #00695c;
            font-weight: bold;
        }

        #loginMessage {
            margin-top: 15px;
            color: red;
        }

        /* DASHBOARD */

        #adminDashboard {
            display: none;
            max-width: 900px;
            margin: auto;
        }

        .dashboard-header {
            background: #00695c;
            color: white;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 25px;
        }

        .dashboard-header h1 {
            margin-bottom: 10px;
        }

        #logoutBtn {
            background: #d32f2f;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
        }

        #logoutBtn:hover {
            background: #b71c1c;
        }

        #reviewsList {
            display: grid;
            gap: 20px;
        }

        .review-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,.15);
        }

        .review-card h3 {
            color: #00695c;
            margin-bottom: 10px;
        }

        .review-card p {
            margin: 8px 0;
        }

        .approve-btn {
            background: #2e7d32;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 10px;
        }

        .delete-btn {
            background: #d32f2f;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        .approve-btn:hover {
            background: #1b5e20;
        }

        .delete-btn:hover {
            background: #b71c1c;
        }

        .status {
            font-weight: bold;
        }
    </style>
</head>

<body>

    <!-- LOGIN SECTION -->

    <div id="loginSection">

        <div class="login-box">

            <img src="logo.png" alt="Leisure Fan Tours Logo">

            <h2>Administrator Login</h2>

            <p>Leisure Fan Tours and Safaris</p>

            <form id="loginForm">

                <input
                    type="email"
                    id="email"
                    placeholder="Email Address"
                    required
                >

                <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    required
                >

                <button type="submit" id="loginBtn">
                    Login
                </button>

            </form>

            <p id="loginMessage"></p>

            <a href="index.html" class="back">
                ← Back to Website
            </a>

        </div>

    </div>


    <!-- ADMIN DASHBOARD -->

    <div id="adminDashboard">

        <div class="dashboard-header">

            <h1>Review Management Dashboard</h1>

            <p>
                Approve customer reviews before they appear on the website.
            </p>

            <button id="logoutBtn">
                Logout
            </button>

        </div>

        <div id="reviewsList">

            <p>Loading reviews...</p>

        </div>

    </div>


    <!-- Firebase and Dashboard JavaScript -->

    <script type="module" src="login.js"></script>

</body>

</html>
