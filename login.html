<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Leisure Fan Tours and Safaris | Admin</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f5f5f5;
            padding: 30px;
            min-height: 100vh;
        }

        /* LOGIN */


    <!-- LOGIN SECTION -->

    <div id="loginSection">

        <div class="login-box">

            <img src="logo.png" alt="Leisure Fan Tours Logo">

            <h2>Administrator Login</h2>

            <p>Leisure Fan Tours and Safaris</p>

            <form id="loginForm">

                <input
                    type="email"
                    id="email"
                    placeholder="Email Address"
                    required
                >

                <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    required
                >

                <button type="submit" id="loginBtn">
                    Login
                </button>

            </form>

            <p id="loginMessage"></p>

            <a href="index.html" class="back">
                ← Back to Website
            </a>

        </div>

    </div>


    <!-- ADMIN DASHBOARD -->

    <div id="adminDashboard">

        <div class="dashboard-header">

            <h1>Review Management Dashboard</h1>

            <p>
                Approve customer reviews before they appear on the website.
            </p>

            <button id="logoutBtn">
                Logout
            </button>

        </div>

        <div id="reviewsList">

            <p>Loading reviews...</p>

        </div>

    </div>


    <!-- Firebase and Dashboard JavaScript -->

    <script type="module" src="login.js"></script>

</body>

</html>
